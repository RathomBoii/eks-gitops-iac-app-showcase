apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }} # ← Pod runs as this identity (name: traefik-service-account)
      containers:
        - name: traefik
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          args:
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --providers.kubernetesingress=true
            - --providers.kubernetescrd=true
            # Allow IngressRoute to reference services in other namespaces (e.g. argocd, monitoring)
            # Disabled by default in Traefik v3 as a security measure
            - --providers.kubernetescrd.allowCrossNamespace=true
            # TLS certs are managed by cert-manager and stored as Kubernetes Secrets.
            # Traefik reads them via the kubernetescrd/kubernetesingress provider.
            # No ACME resolver needed here — cert-manager handles Let's Encrypt.
            - --log.level=INFO
            - --api.dashboard=true
            - --api=true
            # Access logs — log every request with status, latency, backend
            - --accesslog=true
            - --accesslog.format=json
            # Metrics — expose Prometheus scrape endpoint on :8082/metrics
            - --metrics.prometheus=true
            - --metrics.prometheus.entrypoint=metrics
            - --entrypoints.metrics.address=:8082
            # Tracing — OTLP to stdout (no external collector needed to enable the feature)
            # To send to a real collector: replace with --tracing.otlp.grpc.endpoint=<collector>:4317
            - --tracing.otlp=true
            - --tracing.otlp.grpc.insecure=true
            - --tracing.otlp.grpc.endpoint=localhost:4317
            - --tracing.serviceName=traefik
          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
            - name: metrics
              containerPort: 8082
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
