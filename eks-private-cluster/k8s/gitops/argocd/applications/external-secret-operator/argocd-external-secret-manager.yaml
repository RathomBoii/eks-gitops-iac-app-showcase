apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground # ensures that all resources are deleted when the Application is deleted
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    targetRevision: 2.5.0 # make sure to change this to the version you need
    chart: external-secrets
  destination:
    name: in-cluster
    namespace: external-secrets # you can use any namespace
  syncPolicy:
    automated:
      prune: false #  the resource is not deleted when removed from Git, to prevent accidental deletion of secrets
      selfHeal: false # manual sync is required to apply changes, giving you control over when secrets are updated
      allowEmpty: false # prevents syncing if the chart is missing or empty, avoiding unintended consequences
    syncOptions:
      - PrunePropagationPolicy=foreground # ensures that all child resources are deleted before the parent Application is deleted, preventing orphaned resources
      - Replace=false # prevents deletion and recreation of resources on updates, which is important for secrets to avoid downtime
      - PruneLast=false # ensures that resources are pruned before new ones are created, preventing conflicts during updates
      - Validate=true # ensures that resources are validated before being applied, preventing invalid configurations from being deployed
      - CreateNamespace=true # automatically creates the namespace if it doesn't exist, simplifying deployment
      - ApplyOutOfSyncOnly=false # applies all resources, not just those that are out of sync, ensuring consistency
      # SSA is required for ESO CRDs — secretstores and clustersecretstores exceed the 256KB
      # kubectl.kubernetes.io/last-applied-configuration annotation limit used by client-side apply.
      # The previous ComparisonError (".status.terminatingReplicas field not declared in schema") is
      # resolved by upgrading ArgoCD, which ships updated Kubernetes schemas.
      - ServerSideApply=true # client side have limit to 256KB limit
      - RespectIgnoreDifferences=true # must be true for the ignoreDifferences block below to take effect during sync
  # ESO's cert-controller patches caBundle AND other webhook fields (failurePolicy, matchPolicy)
  # post-install. ArgoCD sees drift on any mutated field and keeps re-syncing.
  # Ignoring the entire /webhooks array is safe — only ESO manages these two VWCs,
  # and the webhook rules themselves never change after install.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: externalsecret-validate
      jsonPointers:
        - /webhooks
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: secretstore-validate
      jsonPointers:
        - /webhooks