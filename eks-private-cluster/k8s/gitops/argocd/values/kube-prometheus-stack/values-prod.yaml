# default value file from Helm Chart = https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
#
# This file is an override file — only keys that differ from chart defaults are
# declared here. Helm deep-merges this with the chart's full default values.yaml.
#
# Goal: install Prometheus + the Prometheus Operator AND Grafana from this same
# kube-prometheus-stack release. Grafana is no longer a separate ArgoCD app —
# it is bundled here so the operator wires the Prometheus datasource for us and
# both components share one release lifecycle.
#
#   Grafana      → enabled here (deployed by this same kube-prometheus-stack release)
#   Loki         → separate ArgoCD app  (argocd/applications/loki/)
#   Tempo        → separate ArgoCD app  (argocd/applications/tempo/)
#   Alertmanager → should be enabled here if alerting is needed
#   node-exporter        → enabled here (export worker node metrics to Prometheus)
#   kube-state-metrics   → enabled here (export k8s object eg. pods, deployments, nodes metrics to Prometheus)
#   EKS control plane    → enabled=false here (EKS control plane is isolated from data plane, no metrics endpoint reachable)

# ── Grafana — bundled in this kube-prometheus-stack release ──────────────────
# All keys below are passed through to the grafana/grafana subchart. They were
# previously in values/grafana/values-prod.yaml; now nested under `grafana:`.
grafana:
  enabled: true

  # ── ServiceAccount (IRSA for the CloudWatch datasource) ────────────────────
  # Annotate the Grafana SA with the IRSA role so the CloudWatch datasource
  # (authType: default) can assume it via the AWS SDK default credential chain.
  # Role created by terraform module "iam" (aws_iam_role.grafana_cloudwatch).
  # Get the ARN with:
  #   terraform -chdir=eks-private-cluster/terraform output grafana_cloudwatch_role_arn
  # The SA name below must match var.grafana_service_account_name in that module
  # (default "prometheus-grafana" = <release>-grafana).
  serviceAccount:
    create: true
    name: prometheus-grafana
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::687069305167:role/prod-grafana-cloudwatch-irsa"

  # ── Admin credentials ──────────────────────────────────────────────────────
  # Reference a pre-existing Kubernetes Secret synced from AWS Secrets Manager
  # via ExternalSecret. The chart injects these as GF_SECURITY_ADMIN_* env vars.
  admin:
    existingSecret: grafana-credentials  # K8s Secret created by ExternalSecret
    userKey: admin_user
    passwordKey: admin_password

  # ── Resource limits ────────────────────────────────────────────────────────
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # ── Persistent storage ─────────────────────────────────────────────────────
  # Disabled: SQLite on disk replaced by external PostgreSQL (RDS).
  # All state (dashboards, users, alerting) is stored in the RDS instance.
  persistence:
    enabled: false

  # ── Ingress ────────────────────────────────────────────────────────────────
  ingress:
    enabled: false  # ingress managed by Traefik IngressRoute

  # ── External PostgreSQL database (RDS) ─────────────────────────────────────
  # Grafana expands ${ENV_VAR} references inside grafana.ini at startup.
  # GF_DATABASE_PASSWORD and friends are injected from a Kubernetes Secret
  # (see `envValueFrom` below). From boot, every dashboard/user/alert is
  # written to RDS instead of local SQLite.
  grafana.ini:
    database:
      type: postgres
      host: "${POSTGRES_HOST}:5432"
      name: "${GF_DATABASE_NAME}"
      user: "${GF_DATABASE_USER}"
      password: "${GF_DATABASE_PASSWORD}"
      ssl_mode: require

  # ── Database credentials injected as env vars ──────────────────────────────
  # Grafana resolves ${GF_DATABASE_*} and ${POSTGRES_HOST} in grafana.ini at
  # startup. envValueFrom (not env) is required for secretKeyRef.
  # ── Static env vars ────────────────────────────────────────────────────────
  # GF_DATABASE_TYPE is set as a plain env var so that BOTH the web server AND
  # `grafana cli` pick it up. Without it, `grafana cli admin reset-admin-password`
  # falls back to local SQLite (Grafana 13 CLI ignores the mounted grafana.ini
  # even when GF_PATHS_CONFIG is set).
  env:
    GF_DATABASE_TYPE: postgres
    GF_DATABASE_SSL_MODE: require   # RDS requires TLS; grafana.ini has this too but CLI ignores the ini file

  envValueFrom:
    GF_DATABASE_PASSWORD:
      secretKeyRef:
        name: grafana-credentials
        key: db_password
    GF_DATABASE_NAME:
      secretKeyRef:
        name: grafana-credentials
        key: db_name
    GF_DATABASE_USER:
      secretKeyRef:
        name: grafana-credentials
        key: db_user
    GF_DATABASE_HOST:
      secretKeyRef:
        name: grafana-credentials
        key: db_host
    POSTGRES_HOST:
      secretKeyRef:
        name: grafana-credentials
        key: db_host

  # ── Datasources auto-provisioned on first boot ─────────────────────────────
  # We define the Prometheus datasource explicitly (pointing at the stable
  # operator-managed Service), so disable the stack's auto-injected default to
  # avoid a duplicate Prometheus datasource.
  sidecar:
    datasources:
      defaultDatasourceEnabled: false
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        # ── Prometheus (default metrics datasource) ────────────────────────
        # prometheus-operated is the operator-managed Service — name never
        # changes regardless of the Helm release name.
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://prometheus-operated.monitoring.svc:9090
          isDefault: true

        # ── Tempo (distributed tracing) ────────────────────────────────────
        - name: Tempo
          type: tempo
          uid: tempo
          access: proxy
          url: http://tempo.monitoring.svc:3100
          jsonData:
            # Trace → Logs: span in Tempo → Loki logs for that trace_id
            tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: "-1h"
              spanEndTimeShift: "1h"
              filterByTraceID: true
              filterBySpanID: false
              customQuery: true
              query: '{job=~".+"} | json | trace_id=~"${__trace.traceId}"'
            # Trace → Metrics: link spans to Prometheus metric explorer
            tracesToMetrics:
              datasourceUid: prometheus
            # Service graph: request topology from span data
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
            lokiSearch:
              datasourceUid: loki

        # ── Loki (log aggregation) ─────────────────────────────────────────
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki.monitoring.svc:3100
          jsonData:
            # Logs → Traces: log line with trace_id shows a link to Tempo
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: '"trace_id":"([a-f0-9]{32})"'
                name: TraceID
                url: "${__value.raw}"   # Grafana substitutes the captured trace_id

        # ── CloudWatch (AWS/EKS control-plane metrics — etcd & co.) ─────────
        # Covers the control-plane signals that have NO scrapable endpoint on
        # managed EKS (notably kube-etcd). AWS ingests core control-plane metrics
        # into CloudWatch under the AWS/EKS namespace, so query them from Grafana
        # here rather than from Prometheus.
        #   Ref: https://docs.aws.amazon.com/eks/latest/userguide/view-raw-metrics.html
        #        (section "Deploy a Prometheus scraper…" → CloudWatch AWS/EKS note)
        #
        # Auth — authType: default uses the AWS SDK default credential chain,
        # which on EKS resolves to IRSA. The Grafana ServiceAccount therefore
        # needs an IRSA role annotation with a policy allowing at least:
        #   cloudwatch:GetMetricData, cloudwatch:ListMetrics,
        #   cloudwatch:GetMetricStatistics, cloudwatch:DescribeAlarmsForMetric,
        #   tag:GetResources
        # Set the role on the Grafana SA via grafana.serviceAccount.annotations:
        #   eks.amazonaws.com/role-arn: <grafana-cloudwatch-irsa-role-arn>
        - name: CloudWatch
          type: cloudwatch
          uid: cloudwatch
          access: proxy
          jsonData:
            authType: default            # default chain → IRSA on EKS
            defaultRegion: ap-southeast-7

alertmanager:
  enabled: true  # enable Prometheus AlertManager, evaluate if needed for alerting
nodeExporter:
  enabled: true  # prometheus-node-exporter subchart, export worker node's kernel metrics to Prometheus

kubeStateMetrics:
  enabled: true  # kube-state-metrics subchart, export k8s object (pod, node, deployment, etc.) metrics to Prometheus

# ── EKS: control plane components not reachable from data plane ──────────────
# These must be false on managed EKS. Setting enabled: true tells
# kube-prometheus-stack to create ServiceMonitors that point Prometheus at
# these endpoints — but on EKS the control plane runs on AWS-managed nodes
# that are fully isolated from the data plane. There are no reachable endpoints.
# Result of enabling: Prometheus shows permanent "target unreachable" errors.
#
#   kubeControllerManager / kubeScheduler / kubeEtcd
#     → run on AWS-managed nodes, no metrics endpoint exposed to pods
#   kubeProxy
#     → EKS uses VPC CNI + iptables directly; kube-proxy metrics port not exposed
#* So, in order to ingest these following metrics, you better use Grafana with additional datasources like CloudWatch instead.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
kubeApiServer:
  enabled: true # Prometheus can scrape the API server metrics endpoint, which is reachable from pods in the data plane

# ── Prometheus Operator — keep enabled (required) ────────────────────────────
# The operator watches for Prometheus CRs and creates the StatefulSet.
# Disabling this would mean Prometheus itself never gets deployed.
prometheusOperator:
  enabled: true

# ── Prometheus ────────────────────────────────────────────────────────────────
# Prometheus pod will be have Thanos container sidecar for long-term storage in S3 bucket.
# So, instead of make Grafana point datasource to prometheus service, we better point to Thanos sidecar service
# Which is the same as prometheus service, but it will also have Thanos sidecar container to store metrics in S3 bucket.
prometheus:
  # ── EKS control-plane metrics RBAC (GitOps-safe) ───────────────────────────
  # EKS exposes kube-scheduler and kube-controller-manager metrics through the
  # metrics.eks.amazonaws.com API group (see additionalScrapeConfigs below).
  # The Prometheus ServiceAccount needs `get` on that group or scrapes return 403.
  # Declaring the rule here (instead of `kubectl patch`) means ArgoCD selfHeal
  # won't revert it — the rule is appended to the Prometheus ClusterRole.
  additionalRulesForClusterRole:
    - apiGroups:
        - metrics.eks.amazonaws.com
      resources:
        - kcm/metrics   # kube-controller-manager
        - ksh/metrics   # kube-scheduler
      verbs:
        - get

  prometheusSpec:
    retention: 30d  # longer retention in prod for incident investigation

    # ── IRSA annotation for Thanos sidecar S3 uploads ──────────────────────
    # The Thanos sidecar runs in the same pod as Prometheus. It uses the AWS SDK
    # default credential chain which on EKS resolves to IRSA via the pod
    # annotation below. Without this the sidecar gets Access Denied on S3.
    # Role created by terraform module "iam" (aws_iam_role.thanos_s3).
    # Get the ARN with:
    #   terraform -chdir=eks-private-cluster/terraform output thanos_s3_role_arn
    podMetadata:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::687069305167:role/prod-thanos-s3-irsa"

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
# *Thanos sidecar container will be deployed alongside Prometheus pod to ship metrics to S3 bucket for long-term storage.
    thanos:
      objectStorageConfig:
        secret:
          type: S3
          config:
            bucket: jessada-prometheus-thanos-metric-storage
            region: ap-southeast-7
            endpoint: s3.ap-southeast-7.amazonaws.com  # required by objstore v0.0.0-20250804+; constructed from region
            # On EKS use IRSA — no access keys needed:
            # credentials come from the pod's IAM role (no access_key / secret_key needed)

    # ── EKS control-plane scrape configs ──────────────────────────────────────
    # On managed EKS the kube-scheduler / kube-controller-manager run on AWS-owned
    # nodes, so the chart's kubeScheduler/kubeControllerManager ServiceMonitors
    # (which target node IP:10257/10259) never connect. Instead, EKS 1.28+ exposes
    # these metrics through the API server proxy under the metrics.eks.amazonaws.com
    # API group. We scrape those endpoint paths directly here.
    #
    # Auth: each scrape uses the Prometheus pod's own ServiceAccount token + the
    # in-cluster CA. RBAC for the metrics.eks.amazonaws.com group is granted via
    # prometheus.additionalRulesForClusterRole above.
    #
    # NOTE: etcd and kube-proxy are intentionally NOT here — etcd has no reachable
    # endpoint on EKS (use CloudWatch AWS/EKS), and kube-proxy binds metrics to
    # 127.0.0.1:10249 unless its metricsBindAddress is patched to 0.0.0.0.
    #
    # Source / citation — these job definitions (metrics paths, TLS/bearer-token
    # auth, the default;kubernetes;https relabel keep, and the matching
    # metrics.eks.amazonaws.com RBAC rule above) are adapted from the official
    # AWS EKS documentation:
    #   "Fetch control plane raw metrics in Prometheus format" →
    #   section "Deploy a Prometheus scraper to consistently scrape metrics"
    #   https://docs.aws.amazon.com/eks/latest/userguide/view-raw-metrics.html
    # Endpoint paths (ksh = kube-scheduler, kcm = kube-controller-manager) and the
    # 1.28+ availability note are documented in the same page under
    #   "Fetch control plane metrics with metrics.eks.amazonaws.com".
    additionalScrapeConfigs:
      # ── kube-scheduler ──────────────────────────────────────────────────────
      - job_name: eks-kube-scheduler
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        metrics_path: /apis/metrics.eks.amazonaws.com/v1/ksh/container/metrics
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          # Keep only the default/kubernetes/https endpoint (the API server),
          # which is where the metrics.eks.amazonaws.com proxy path is served.
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            action: keep
            regex: default;kubernetes;https

      # ── kube-controller-manager ───────────────────────────────────────────────
      - job_name: eks-kube-controller-manager
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        metrics_path: /apis/metrics.eks.amazonaws.com/v1/kcm/container/metrics
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            action: keep
            regex: default;kubernetes;https

    # ── Persistent storage ──────────────────────────────────────────────────
    # storageSpec adds a volumeClaimTemplate to the Prometheus StatefulSet.
    # The Prometheus Operator creates one PVC per replica automatically.
    #
    # How it works:
    #   1. The Operator reads this storageSpec from the Prometheus CR (Custom Resource).
    #   2. It injects a volumeClaimTemplate into the StatefulSet spec.
    #   3. Kubernetes provisions an EBS volume (via the storageClassName) and
    #      binds it to the pod on scheduling.
    #   4. TSDB data written to /prometheus is persisted on that EBS volume
    #      and survives pod restarts and rescheduling.
    #
    # Without storageSpec: Prometheus uses emptyDir (ephemeral) — all metrics
    # data is lost on every pod restart.
    #
    # storageClassName options on EKS:
    #   gp2  → older default, EBS General Purpose SSD (AWS default StorageClass)
    #   gp3  → newer, better performance/cost — create a StorageClass for it first
    #   ""   → use the cluster's default StorageClass
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2   # EBS StorageClass — change to gp3 if available
          accessModes:
            - ReadWriteOnce       # EBS volumes only support single-node attachment
          resources:
            requests:
              storage: 10Gi       # size of the EBS volume per Prometheus replica
